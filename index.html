<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraScan | Geospatial Intelligence for Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            line-height: 1.1;
        }
        p {
            font-size: 1.25rem;
            color: #4b5563;
            max-width: 600px;
            margin: 1.5rem 0 2.5rem 0;
            line-height: 1.6;
        }
        .btn {
            background-color: #111827;
            color: white;
            padding: 1rem 2rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            background-color: #374151;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .footer {
            position: absolute;
            bottom: 2rem;
            color: #9ca3af;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">? TerraScan</div>
        <h1>Geospatial Insight for<br><span style="color: #3b82f6;">World Heritage.</span></h1>
        <p>Advanced satellite processing for environmental conservation, temporal monitoring, and UNESCO site preservation.</p>
        <a href="https://terrascan.streamlit.app/" class="btn">Launch Dashboard ?</a>
        <div class="footer">Built for NGGSIC 2026. All rights reserved.</div>
    </div>
</body>
</html>
